services:
  - type: web
    name: zdajb-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run deploy:build:postgres
    preDeployCommand: npm run deploy:db:push
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: zdajb-db
          property: connectionString
      - key: PUBLIC_APP_URL
        value: https://zdajb.pl
      - key: MEDIA_BASE_URL
        value: https://media.zdajb.pl
      - key: ALLOWED_ORIGINS
        value: https://www.zdajb.pl
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_NAME
        value: pj_session
      - key: SESSION_DAYS
        value: "30"
      - key: ALLOW_DEV_GRANTS
        value: "false"
      - key: ADMIN_EMAILS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Zdaj B <no-reply@zdajb.pl>
      - key: CONTACT_EMAIL
        value: kontakt@zdajb.pl

databases:
  - name: zdajb-db
    plan: starter
    databaseName: zdajb
    user: zdajb
